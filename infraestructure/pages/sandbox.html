<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePrime | Sandbox</title>

    <link rel="icon" href="../assests/images/logoCinema.png" type="image/png">
    <link rel="stylesheet" href="../assests/css/menu.css">
    <link rel="stylesheet" href="../assests/css/atividade-4.css">
</head>
<body>
    <header>
        <h1>Sandbox</h1>
        <p>Sandbox para praticar áudio, vídeo e CSS externo.</p>

        <nav id="menu" aria-label="Menu principal">
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Sobre</a></li>

                <li><a href="paletas.html">Paletas</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <p class="descricao">Conteúdos de teste para áudio e vídeo embutido.</p>

        <p><a class="voltar" href="index.html">Voltar para página inicial</a></p>

        <section class="bloco">
            <h2>Teste de áudio</h2>
            <audio controls preload="metadata" autoplay loop>
                <source src="../assests/audios/subi-no-pe-de-pera-bob-128k.mp3" type="audio/mpeg">
                <p>
                    Seu navegador não reproduz áudio.
                    <a href="../assests/audios/subi-no-pe-de-pera-bob-128k.mp3" download="subi-no-pe-de-pera-bob-128k.mp3">Clique aqui para baixar</a>.
                </p>
            </audio>
        </section>

        <section class="bloco">
            <h2>Teste de vídeo externo</h2>
            <iframe
                src="https://player.vimeo.com/video/76979871"
                title="Vídeo externo no Vimeo"
                allow="autoplay; fullscreen; picture-in-picture"
                allowfullscreen>
            </iframe>
            <p>
                Caso o player não abra, assista direto no
                <a href="https://vimeo.com/76979871" target="_blank" rel="noopener noreferrer">Vimeo</a>.
            </p>
        </section>
    </main>

    <footer>
        <p>CinePrime - Página Sandbox</p>
    </footer>
</body>
</html>
